syntax = "proto3";

package nftblockd;

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service StatusService {
  rpc GetStatus(google.protobuf.Empty) returns (StatusSummary);
  rpc GetDropStats(google.protobuf.Empty) returns (Stats);
  rpc ReloadTable(google.protobuf.Empty) returns (StatusSummary);
  rpc FlushTable(google.protobuf.Empty) returns (StatusSummary);
}

message DropStats {
  uint64 packets = 1;
  uint64 bytes = 2;
}

message IpFamilyDropStats {
  DropStats combined = 1;
  DropStats ipv4 = 2;
  DropStats ipv6 = 3;
}

message ChainDropStats {
  DropStats combined = 1;
  IpFamilyDropStats prerouting = 2;
  IpFamilyDropStats postrouting = 3;
}

message Stats {
  ChainDropStats main_blocklist_drop_stats = 1;
  ChainDropStats custom_blocklist_drop_stats = 2;
}

message StatusSummary {
  int32 status_code = 1;
  string status = 2;
  string message = 3;
}
